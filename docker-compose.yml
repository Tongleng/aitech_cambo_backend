version: '3.8'

services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    container_name: aitech_cambo
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: iamthepasswordthatyoucannotbeatin2026
      MYSQL_DATABASE: aitech_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: